<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zarco CRM — design v1</title>

  <link rel="icon" href="assets/zarco-mark.svg" />
  <link rel="stylesheet" href="assets/zarco-tokens.css" />
  <link rel="stylesheet" href="app/styles.css" />

  <style>
    html, body { margin: 0; height: 100%; background: #0A1322; }
    /* Make sure the canvas frame itself doesn't show a light bg behind dark screens */
    body { font-family: 'Inter', system-ui, sans-serif; color: #F5F1EA; }
  </style>

  <!-- React 18.3.1 (pinned, with integrity) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shared primitives -->
  <script type="text/babel" src="app/Icons.jsx"></script>
  <script type="text/babel" src="app/Shell.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="app/screens/DesignSystem.jsx"></script>
  <script type="text/babel" src="app/screens/Login.jsx"></script>
  <script type="text/babel" src="app/screens/Dashboard.jsx"></script>
  <script type="text/babel" src="app/screens/ContactsList.jsx"></script>
  <script type="text/babel" src="app/screens/DealDetail.jsx"></script>
  <script type="text/babel" src="app/screens/Kanban.jsx"></script>
  <script type="text/babel" src="app/screens/CommandPalette.jsx"></script>

  <!-- Canvas wrapper -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Each artboard contains a fully-realized screen.
    // Width 1440, height 900 — laptop default.
    const SCREEN_W = 1440;
    const SCREEN_H = 900;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="foundations" title="Foundations" subtitle="Tokens, type, components, decisions.">
            <DCArtboard id="ds" label="Design system · v0.1" width={1320} height={1320}>
              <DesignSystem />
            </DCArtboard>
          </DCSection>

          <DCSection id="auth" title="Auth" subtitle="Magic link login.">
            <DCArtboard id="login" label="Login · /sign-in" width={SCREEN_W} height={SCREEN_H}>
              <Login />
            </DCArtboard>
          </DCSection>

          <DCSection id="shell" title="Core surfaces" subtitle="App shell + the four highest-leverage screens.">
            <DCArtboard id="dashboard" label="Dashboard · /" width={SCREEN_W} height={SCREEN_H}>
              <Dashboard />
            </DCArtboard>
            <DCArtboard id="contacts" label="Contacts list · /contacts" width={SCREEN_W} height={SCREEN_H}>
              <ContactsList />
            </DCArtboard>
            <DCArtboard id="deal" label="Deal detail · /deals/[id]" width={SCREEN_W} height={SCREEN_H}>
              <DealDetail />
            </DCArtboard>
            <DCArtboard id="kanban" label="Pipeline · /deals" width={SCREEN_W} height={SCREEN_H}>
              <Kanban />
            </DCArtboard>
          </DCSection>

          <DCSection id="patterns" title="Cross-cutting patterns" subtitle="Cmd-K · the nerve centre.">
            <DCArtboard id="cmdk" label="Command palette · ⌘K" width={SCREEN_W} height={SCREEN_H}>
              <CommandPalette />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
